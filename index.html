<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>CodeWeaver AI</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0a0a0f;
  color: white;
}

/* 🌌 Glow background */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background:
    radial-gradient(circle at 20% 30%, rgba(0,0,255,0.3), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(255,0,0,0.3), transparent 40%);
  filter: blur(80px);
  z-index: -1;
}

/* 🧠 Container */
.container {
  max-width: 900px;
  margin: 60px auto;
  padding: 20px;
  backdrop-filter: blur(20px);
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.1);
}

/* Title */
h1 {
  text-align: center;
  text-shadow: 0 0 20px blue, 0 0 20px red;
}

/* Input */
input {
  width: 100%;
  padding: 15px;
  border-radius: 10px;
  border: none;
  background: #111;
  color: white;
  margin-top: 20px;
}

/* Button */
button {
  width: 100%;
  padding: 15px;
  margin-top: 15px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(90deg, blue, red);
  color: white;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 0 20px blue, 0 0 20px red;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

/* Loader */
#loader {
  display: none;
  text-align: center;
  margin-top: 20px;
}

#loader div {
  font-size: 50px;
  animation: spin 1s linear infinite;
}

/* Cards */
.card {
  background: #111;
  padding: 15px;
  margin-top: 15px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.1);
}

/* Code block */
.code {
  background: #000;
  padding: 10px;
  border-radius: 8px;
  overflow-x: auto;
  font-size: 13px;
}

/* Animation */
@keyframes spin {
  0% { transform: rotate(0deg) translateX(0px); }
  50% { transform: rotate(180deg) translateX(10px); }
  100% { transform: rotate(360deg) translateX(0px); }
}
</style>

</head>

<body>

<div class="bg"></div>

<div class="container">

<h1>🚀 CodeWeaver AI</h1>

<input id="prompt" placeholder="Describe your app idea..." />

<button onclick="generate()">✨ Generate</button>

<div id="loader">
  <div>🐹</div>
  <p>Generating your app...</p>
</div>

<div id="output"></div>

</div>

<script>
async function generate() {
  const prompt = document.getElementById("prompt").value;
  const loader = document.getElementById("loader");
  const output = document.getElementById("output");

  loader.style.display = "block";
  output.innerHTML = "";

  try {
    const res = await fetch("https://code-weaver-ai.onrender.com/generate", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ prompt })
    });

    const data = await res.json();
    console.log("API RESPONSE:", data);

    // FEATURES
    let featuresHTML = "<div class='card'><h3>📌 Features</h3><ul>";
    (data.features || []).forEach(f => {
      featuresHTML += `<li>${f}</li>`;
    });
    featuresHTML += "</ul></div>";

    // ARCHITECTURE
    let archHTML = "<div class='card'><h3>🏗️ Architecture</h3>";
    for (let key in (data.architecture || {})) {
      archHTML += `<p><b>${key}:</b> ${JSON.stringify(data.architecture[key])}</p>`;
    }
    archHTML += "</div>";

    // CODE
    let codeHTML = `
      <div class='card'>
        <h3>💻 Generated Code</h3>
        <div class='code'>${(data.code || "").replace(/</g,"&lt;")}</div>
      </div>
    `;

    output.innerHTML = featuresHTML + archHTML + codeHTML;

  } catch (err) {
    output.innerHTML = "<div class='card'>❌ Error: " + err.message + "<br><br>👉 Wait if server is waking up</div>";
  } finally {
    loader.style.display = "none";
  }
}
</script>

</body>
</html>
