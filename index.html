<!DOCTYPE html>
<html>
<head>
  <title>CodeWeaver AI</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle at top, #0f172a, #020617);
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 40px;
      font-size: 40px;
      color: #c084fc;
    }

    .container {
      width: 80%;
      max-width: 800px;
      margin: 40px auto;
      padding: 30px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      box-shadow: 0 0 30px rgba(59,130,246,0.4),
                  0 0 60px rgba(239,68,68,0.3);
    }

    input {
      width: 70%;
      padding: 15px;
      border-radius: 10px;
      border: none;
      outline: none;
      font-size: 16px;
    }

    button {
      padding: 15px 25px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      cursor: pointer;
      background: linear-gradient(90deg, #3b82f6, #ef4444);
      color: white;
      margin-left: 10px;
      box-shadow: 0 0 15px rgba(239,68,68,0.7);
    }

    button:hover {
      transform: scale(1.05);
    }

    #output {
      margin-top: 20px;
      text-align: left;
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 10px;
      white-space: pre-wrap;
    }

    /* 🐹 Hamster Loader */
    #loader {
      display: none;
      margin-top: 20px;
    }

    .hamster {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: orange;
      margin: auto;
      animation: run 0.5s infinite alternate;
    }

    @keyframes run {
      from { transform: translateX(-20px); }
      to { transform: translateX(20px); }
    }
  </style>
</head>

<body>

  <h1>🚀 CodeWeaver AI</h1>

  <div class="container">

    <input id="prompt" placeholder="Enter your app idea..." />
    <button onclick="generate()">Generate</button>

    <div id="loader">
      <div class="hamster"></div>
      <p>Generating... 🐹</p>
    </div>

    <div id="output"></div>

  </div>

<script>
async function generate() {
  const prompt = document.getElementById("prompt").value;

  if (!prompt) {
    alert("Enter something!");
    return;
  }

  document.getElementById("loader").style.display = "block";
  document.getElementById("output").innerText = "";

  try {
    const res = await fetch("https://code-weaver-ai.onrender.com/generate/", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt }),
      mode: "cors"
    });

    const data = await res.json();

    document.getElementById("loader").style.display = "none";

    if (data.error) {
      document.getElementById("output").innerText = "❌ Error: " + data.error;
      return;
    }

    document.getElementById("output").innerText =
      "📌 FEATURES:\n" + JSON.stringify(data.features, null, 2) +
      "\n\n🏗️ ARCHITECTURE:\n" + JSON.stringify(data.architecture, null, 2) +
      "\n\n💻 CODE:\n" + data.code;

  } catch (err) {
    document.getElementById("loader").style.display = "none";
    document.getElementById("output").innerText =
      "❌ Error: Failed to fetch\n👉 Wait 20 seconds and try again (Render sleep)";
  }
}
</script>

</body>
</html>
