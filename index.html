<body style="margin:0; font-family:Arial; background:#0a0a0f; color:white;">

<!-- 🌌 Background Glow -->
<div style="
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at 20% 30%, rgba(0,0,255,0.3), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(255,0,0,0.3), transparent 40%);
filter: blur(80px);
z-index:-1;
"></div>

<!-- 🧠 Main Container -->
<div style="max-width:800px; margin:60px auto; padding:20px; backdrop-filter: blur(20px); border-radius:20px; border:1px solid rgba(255,255,255,0.1);">

<h1 style="text-align:center; color:#fff; text-shadow:0 0 20px blue, 0 0 20px red;">
🚀 CodeWeaver AI
</h1>

<input id="prompt" placeholder="Describe your app..."
style="
width:100%;
padding:15px;
border-radius:10px;
border:none;
outline:none;
background:#111;
color:white;
margin-top:20px;
"
/>

<button onclick="generate()"
style="
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:10px;
background:linear-gradient(90deg, blue, red);
color:white;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 20px blue, 0 0 20px red;
transition:0.3s;
"
onmouseover="this.style.transform='scale(1.05)'"
onmouseout="this.style.transform='scale(1)'"
>
✨ Generate
</button>

<!-- 🐹 Hamster Loader -->
<div id="loader" style="display:none; text-align:center; margin-top:20px;">
  <div style="font-size:50px; animation:spin 1s linear infinite;">🐹</div>
  <p>Generating magic...</p>
</div>

<pre id="output"
style="
margin-top:20px;
white-space:pre-wrap;
background:#111;
padding:15px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.1);
"></pre>

</div>

<style>
@keyframes spin {
  0% { transform: rotate(0deg) translateX(0px); }
  50% { transform: rotate(180deg) translateX(10px); }
  100% { transform: rotate(360deg) translateX(0px); }
}
</style>

</body>
