<!DOCTYPE html>
<html>
<head>
  <title>CodeWeaver AI</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle at top, #0f172a, #020617);
      color: white;
      overflow-x: hidden;
    }

    /* Background glow */
    body::before {
      content: "";
      position: fixed;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(59,130,246,0.3), transparent);
      top: -100px;
      left: -100px;
      filter: blur(120px);
      z-index: -1;
    }

    body::after {
      content: "";
      position: fixed;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(239,68,68,0.3), transparent);
      bottom: -100px;
      right: -100px;
      filter: blur(120px);
      z-index: -1;
    }

    h1 {
      text-align: center;
      margin-top: 30px;
      font-size: 40px;
      background: linear-gradient(90deg, #3b82f6, #ef4444);
      -webkit-background-clip: text;
      color: transparent;
    }

    .container {
      width: 60%;
      margin: auto;
      margin-top: 40px;
      padding: 30px;

      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border-radius: 15px;

      box-shadow:
        0 0 20px rgba(59,130,246,0.4),
        0 0 40px rgba(239,68,68,0.2);
    }

    input {
      width: 70%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      background: rgba(255,255,255,0.1);
      color: white;
      outline: none;
    }

    button {
      padding: 12px 20px;
      margin-left: 10px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(90deg, #3b82f6, #ef4444);
      color: white;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 0 15px rgba(59,130,246,0.7);
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px rgba(239,68,68,0.9);
    }

    #output {
      margin-top: 30px;
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 10px;
      white-space: pre-wrap;
    }

    /* Hamster Loader */
    .loader {
      display: none;
      text-align: center;
      margin-top: 20px;
    }

    .hamster {
      font-size: 40px;
      animation: run 0.5s infinite linear;
    }

    @keyframes run {
      0% { transform: translateX(0); }
      50% { transform: translateX(10px); }
      100% { transform: translateX(0); }
    }
  </style>
</head>

<body>

<h1>🚀 CodeWeaver AI</h1>

<div class="container">

  <input id="prompt" placeholder="Describe your app idea..." />
  <button onclick="generate()">Generate</button>

  <div class="loader" id="loader">
    <div class="hamster">🐹</div>
    <p>Generating magic...</p>
  </div>

  <div id="output"></div>

</div>

<script>
async function generate() {
  const prompt = document.getElementById("prompt").value;

  document.getElementById("loader").style.display = "block";
  document.getElementById("output").innerText = "";

  const res = await fetch("http://127.0.0.1:8000/generate", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({prompt})
  });

  const data = await res.json();

  document.getElementById("loader").style.display = "none";

  document.getElementById("output").innerText =
    "📌 FEATURES:\n" + JSON.stringify(data.features, null, 2) +
    "\n\n🏗️ ARCHITECTURE:\n" + JSON.stringify(data.architecture, null, 2) +
    "\n\n💻 CODE:\n" + data.code;
}
</script>

</body>
</html>
